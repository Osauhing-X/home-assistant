name: Node Server - UI
slug: node_server_with_ui
version: "0.0.1"
description: Priv Github repo Node.js server addon
arch:
  - amd64
  - aarch64
  - armv7
  - armhf
  - i386
homeassistant_api: true
startup: "application"
boot: auto
init: true
ingress: true
ingress_port: 2999
host_network: true
panel_icon: mdi:television-classic
panel_title: Popcorn
options:
  github_token: ""
  repo:
    - username/name.git
    - example_2/repo_2.git
  env:
    - name=value
    - example_2=value_2
schema:
  github_token: password
  repo:
    - str
  env:
    - str
