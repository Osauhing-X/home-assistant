name: Svelte Test Addon
slug: svelte_test
version: "0.0.1.3"
description: SvelteKit app running inside Home Assistant addon
arch:
  - amd64
  - aarch64
  - armv7
startup: "application"
boot: auto
ingress: true
ingress_port: 8080
host_network: true
panel_icon: mdi:web
panel_title: Svelte App
init: false
options:
  api_url: "http://example.com"
  refresh_interval: 10
schema:
  api_url:
    name: API URL
    description: "Sisesta API aadress"
    example: "http://localhost:8080"
    required: true
  refresh_interval:
    name: Refresh interval
    description: "Uuendamise intervall sekundites"
    example: 10
    required: false