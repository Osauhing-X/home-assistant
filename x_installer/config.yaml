name: X Plugins Installer
slug: x_installer
description: Auto-installs and updates custom plugins from GitHub
version: "1.5.3"
arch:
  - amd64
  - aarch64
  - armv7
homeassistant_api: true
startup: "services"
boot: auto
init: false
map:
  - homeassistant_config:rw
ingress: false
host_network: true

options:
  repo: "https://github.com/Osauhing-X/home-assistant.git"
  interval: 3600

schema:
  repo: str
  interval: int
